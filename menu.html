<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daftar Menu - Kafe Nara</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#F8F4EE;
}

header{
    background:#3E2723;
    color:white;
    text-align:center;
    padding:25px;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:30px;
}

h2{
    color:#3E2723;
    margin-bottom:20px;
}

.menu-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:20px;
    margin-bottom:40px;
}

.menu-card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.menu-card img{
    width:100%;
    display:block;
    border-radius:20px 20px 0 0;
}

.menu-content{
    padding:20px;
}

.menu-content h3{
    color:#3E2723;
    margin-bottom:10px;
}

.menu-content p{
    color:#666;
    font-size:14px;
    margin-bottom:10px;
}

.harga{
    color:#C67C4E;
    font-weight:bold;
    font-size:18px;
}

.empty{
    text-align:center;
    color:#777;
    padding:20px;
}

.btn-detail{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#C67C4E;
    color:white;
    cursor:pointer;
    font-weight:600;
}

.btn-detail:hover{
    opacity:0.9;
}

.btn-back-home{
    position:fixed;
    top:20px;
    left:20px;
    z-index:1000;
    padding:12px 20px;
    background:#3E2723;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:600;
}

.btn-cart{
    position:fixed;
    top:20px;
    right:20px;
    z-index:1000;
    padding:12px 20px;
    background:#C67C4E;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:600;
}

.btn-cart:hover{
    opacity:0.9;
}

</style>

</head>

<body>

<header>
    <h1>☕ Daftar Menu Kafe Nara</h1>
</header>

<div class="container">

    <a href="index.html" class="btn-back-home">
        ← Kembali ke Home
    </a>

    <a href="keranjang.html" class="btn-cart">
        🛒 Lihat Keranjang
    </a>

    <h2>🍽️ Menu Makanan</h2>
    <div class="menu-grid" id="menuMakanan"></div>

    <h2>🥤 Menu Minuman</h2>
    <div class="menu-grid" id="menuMinuman"></div>

</div>

<script>

const dataMenu = JSON.parse(localStorage.getItem("dataMenuCafé")) || [];

const makanan = dataMenu.filter(menu => menu.kategori === "Makanan");
const minuman = dataMenu.filter(menu => menu.kategori === "Minuman");

tampilkanMenu(makanan,"menuMakanan");
tampilkanMenu(minuman,"menuMinuman");

function tampilkanMenu(data,idContainer){

    const container = document.getElementById(idContainer);
    

    if(data.length === 0){
        container.innerHTML = `
            <div class="empty">
                Belum ada menu tersedia.
            </div>
        `;
        return;
    }

    data.forEach(menu => {
        container.innerHTML += `
            <div class="menu-card">

                <img src="${menu.gambar}" alt="${menu.namaMenu}">

                <div class="menu-content">

                    <h3>${menu.namaMenu}</h3>

                    <p>${menu.deskripsi}</p>

                    <div class="harga">
                        Rp ${menu.harga.toLocaleString("id-ID")}
                    </div>

                    <button
                        class="btn-detail"
                        onclick='lihatDetail(${JSON.stringify(menu)})'
                    >
                        Lihat Detail
                    </button>

                </div>

            </div>
        `;

    });

}
function lihatDetail(menu){

    localStorage.setItem(
        "detailMenu",
        JSON.stringify(menu)
    );

    window.location.href = "detail-menu.html";
}

</script>

</body>
</html>
