<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Daftar Menu - Kafe Nara</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#F8F4EE;
}

header{
    background:#3E2723;
    color:white;
    text-align:center;
    padding:25px;
}

.container{
    max-width:1200px;
    margin:auto;
    padding:30px;
}

h2{
    color:#3E2723;
    margin-bottom:20px;
}

.menu-grid{
    display:grid;
    grid-template-columns:repeat(3, 1fr);
    gap:20px;
    margin-bottom:40px;
}

.menu-card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.menu-card img{
    width:100%;
    display:block;
    border-radius:20px 20px 0 0;
}

.menu-content{
    padding:20px;
}

.menu-content h3{
    color:#3E2723;
    margin-bottom:10px;
}

.menu-content p{
    color:#666;
    font-size:14px;
    margin-bottom:10px;
}

.harga{
    color:#C67C4E;
    font-weight:bold;
    font-size:18px;
}

.empty{
    text-align:center;
    color:#777;
    padding:20px;
}

.btn-detail{
    margin-top:15px;
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#C67C4E;
    color:white;
    cursor:pointer;
    font-weight:600;
}

.btn-detail:hover{
    opacity:0.9;
}

.btn-back-home{
    position:fixed;
    top:20px;
    left:20px;
    z-index:1000;
    padding:12px 20px;
    background:#3E2723;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:600;
}

.btn-cart{
    position:fixed;
    top:20px;
    right:20px;
    z-index:1000;
    padding:12px 20px;
    background:#C67C4E;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:600;
}

.btn-cart:hover{
    opacity:0.9;
}

</style>

</head>

<body>

<header>
    <h1>☕ Daftar Menu Kafe Nara</h1>
</header>

<div class="container">

    <a href="index.html" class="btn-back-home">
        ← Kembali ke Home
    </a>

    <a href="keranjang.html" class="btn-cart">
        🛒 Lihat Keranjang
    </a>

    <h2>🍽️ Menu Makanan</h2>
    <div class="menu-grid" id="menuMakanan"></div>

    <h2>🥤 Menu Minuman</h2>
    <div class="menu-grid" id="menuMinuman"></div>

</div>

<script>

const menuDefault = [
    // MAKANAN
    {
        namaMenu: "Burger",
        kategori: "Makanan",
        harga: 35000,
        gambar: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600",
        deskripsi: "Burger daging sapi dengan keju dan sayuran segar."
    },
    {
        namaMenu: "French Fries",
        kategori: "Makanan",
        harga: 20000,
        gambar: "https://images.unsplash.com/photo-1576107232684-1279f390859f?w=600",
        deskripsi: "Kentang goreng renyah disajikan dengan saus."
    },
    {
        namaMenu: "Ayam Goreng",
        kategori: "Makanan",
        harga: 30000,
        gambar: "https://images.unsplash.com/photo-1626645738196-c2a7c87a8f58?w=600",
        deskripsi: "Ayam goreng krispi dengan bumbu spesial."
    },
    {
        namaMenu: "Ayam Panggang",
        kategori: "Makanan",
        harga: 35000,
        gambar: "https://images.unsplash.com/photo-1598515214211-89d3c73ae83b?w=600",
        deskripsi: "Ayam panggang dengan rempah pilihan."
    },
    {
        namaMenu: "Snack Platter",
        kategori: "Makanan",
        harga: 40000,
        gambar: "https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=600",
        deskripsi: "Kombinasi kentang, sosis, nugget, dan camilan lezat."
    },

    // MINUMAN
    {
        namaMenu: "Cappuccino",
        kategori: "Minuman",
        harga: 25000,
        gambar: "https://images.unsplash.com/photo-1509042239860-f550ce710b93?w=600",
        deskripsi: "Kopi cappuccino dengan foam lembut."
    },
    {
        namaMenu: "Matcha",
        kategori: "Minuman",
        harga: 28000,
        gambar: "https://images.unsplash.com/photo-1515823064-d6e0c04616a7?w=600",
        deskripsi: "Minuman teh hijau khas Jepang yang creamy."
    },
    {
        namaMenu: "Chocolate",
        kategori: "Minuman",
        harga: 25000,
        gambar: "https://images.unsplash.com/photo-1542990253-0d0f5be5f0ed?w=600",
        deskripsi: "Minuman cokelat hangat dengan rasa premium."
    },
    {
        namaMenu: "Air Putih",
        kategori: "Minuman",
        harga: 5000,
        gambar: "https://images.unsplash.com/photo-1550505095-81378a674395?w=600",
        deskripsi: "Air mineral segar."
    },
    {
        namaMenu: "Jus Alpukat",
        kategori: "Minuman",
        harga: 22000,
        gambar: "https://images.unsplash.com/photo-1623065422902-30a2d299bbe4?w=600",
        deskripsi: "Jus alpukat segar dengan susu cokelat."
    },
    {
        namaMenu: "Es Krim Mangkok",
        kategori: "Minuman",
        harga: 18000,
        gambar: "https://images.unsplash.com/photo-1563805042-7684c019e1cb?w=600",
        deskripsi: "Es krim lembut disajikan dalam mangkok."
    }
];
let dataMenu = JSON.parse(localStorage.getItem("dataMenuCafé"));

if (!dataMenu || dataMenu.length === 0) {
    dataMenu = menuDefault;
    localStorage.setItem("dataMenuCafé", JSON.stringify(menuDefault));
}

const makanan = dataMenu.filter(menu => menu.kategori === "Makanan");
const minuman = dataMenu.filter(menu => menu.kategori === "Minuman");

tampilkanMenu(makanan,"menuMakanan");
tampilkanMenu(minuman,"menuMinuman");

function tampilkanMenu(data,idContainer){

    const container = document.getElementById(idContainer);
    

    if(data.length === 0){
        container.innerHTML = `
            <div class="empty">
                Belum ada menu tersedia.
            </div>
        `;
        return;
    }

    data.forEach(menu => {
        container.innerHTML += `
            <div class="menu-card">

                <img src="${menu.gambar}" alt="${menu.namaMenu}">

                <div class="menu-content">

                    <h3>${menu.namaMenu}</h3>

                    <p>${menu.deskripsi}</p>

                    <div class="harga">
                        Rp ${menu.harga.toLocaleString("id-ID")}
                    </div>

                    <button
                        class="btn-detail"
                        onclick='lihatDetail(${JSON.stringify(menu)})'
                    >
                        Lihat Detail
                    </button>

                </div>

            </div>
        `;

    });

}
function lihatDetail(menu){

    localStorage.setItem(
        "detailMenu",
        JSON.stringify(menu)
    );

    window.location.href = "detail-menu.html";
}

</script>

</body>
</html>
