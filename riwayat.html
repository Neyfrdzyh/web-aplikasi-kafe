<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Riwayat Pesanan - Nara Cafe</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    background:#F8F4EE;
    padding:30px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    color:#3E2723;
    margin-bottom:30px;
    text-align:center;
}

.riwayat-box{
    background:white;
    padding:25px;
    border-radius:20px;
    margin-bottom:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.riwayat-box p{
    margin:8px 0;
    color:#555;
}

.total{
    color:#C67C4E;
    font-weight:bold;
    font-size:20px;
}

.status{
    display:inline-block;
    background:#FFF3CD;
    color:#856404;
    padding:6px 12px;
    border-radius:20px;
    font-size:14px;
    font-weight:600;
}

.empty{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
}

.back-btn{
    display:inline-block;
    margin-bottom:25px;
    text-decoration:none;
    color:white;
    background:#3E2723;
    padding:12px 20px;
    border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

    <a href="index.html" class="back-btn">
        ← Kembali ke Home
    </a>

    <h1>📋 Riwayat Pesanan</h1>

    <div id="daftarRiwayat"></div>

</div>

<script>
const userLogin =
JSON.parse(localStorage.getItem("userLogin"));

if(!userLogin){
    alert("Silakan login terlebih dahulu.");
    window.location.href = "login.html";
}

const riwayat =
JSON.parse(localStorage.getItem("riwayatPesanan")) || [];

const daftar =
document.getElementById("daftarRiwayat");

/* ambil data sesuai user */
const riwayatUser =
riwayat.filter(item =>
    item.namaUser === userLogin.nama
);

if(riwayatUser.length === 0){

    daftar.innerHTML = `
        <div class="empty">
            Belum ada riwayat pesanan ☕
        </div>
    `;

} else {

    riwayatUser.forEach(data => {

        let daftarMenu = "";

        data.pesanan.forEach(menu => {
            daftarMenu += `
                <p>
                    • ${menu.namaMenu}
                    x${menu.jumlah}
                </p>
            `;
        });

        daftar.innerHTML += `
            <div class="riwayat-box">

                <p><strong>Tanggal:</strong> ${data.tanggal}</p>

                <p><strong>Nomor Meja:</strong> ${data.meja}</p>

                <p><strong>Pembayaran:</strong> ${data.pembayaran}</p>

                <p><strong>Pesanan:</strong></p>

                ${daftarMenu}

                <p class="total">
                    Total: Rp ${data.total.toLocaleString("id-ID")}
                </p>

                <p>
                    <strong>Status:</strong>
                    <span class="status">${data.status}</span>
                </p>

            </div>
        `;
    });
}

</script>

</body>
</html>
